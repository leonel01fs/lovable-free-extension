<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Lovable Free</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Lovable Free</h1>
        <p>Chat local para prompts, arquivos e GitHub</p>
      </div>
      <div class="badge">AI</div>
    </header>

    <main id="chat"></main>

    <section class="upload-box">
      <label for="fileInput">📎 Selecionar arquivos</label>
      <input type="file" id="fileInput" multiple />
      <div id="fileList">Nenhum arquivo selecionado.</div>
    </section>

    <section class="composer">
      <textarea id="messageInput" placeholder="Digite sua mensagem para organizar e depois copiar para o Lovable..."></textarea>

      <div class="actions">
        <button id="sendBtn">Adicionar</button>
        <button id="copyBtn">Copiar</button>
        <button id="exportBtn">Exportar</button>
        <button id="clearBtn" class="danger">Limpar</button>
      </div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
